<div class="p-6 max-w-4xl mx-auto">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold text-surface-900 dark:text-surface-0">Create Vendor</h1>
  </div>

  <div class="bg-surface-0 dark:bg-surface-900 rounded-xl shadow-sm border border-surface-200 dark:border-surface-700 p-6">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col gap-2">
          <label for="erpId" class="font-medium text-surface-900 dark:text-surface-0">ERP ID *</label>
          <input pInputText id="erpId" formControlName="erpId" />
          <small class="text-red-500" *ngIf="form.get('erpId')?.invalid && form.get('erpId')?.touched">
            ERP ID is required
          </small>
        </div>

        <div class="flex flex-col gap-2">
          <label for="name" class="font-medium text-surface-900 dark:text-surface-0">Name *</label>
          <input pInputText id="name" formControlName="name" />
          <small class="text-red-500" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
            Name is required
          </small>
        </div>

        <div class="flex flex-col gap-2">
          <label for="taxRegistrationNumber" class="font-medium text-surface-900 dark:text-surface-0">Tax Registration Number *</label>
          <input pInputText id="taxRegistrationNumber" formControlName="taxRegistrationNumber" />
          <small class="text-red-500" *ngIf="form.get('taxRegistrationNumber')?.invalid && form.get('taxRegistrationNumber')?.touched">
            Tax Registration Number is required
          </small>
        </div>

        <div class="flex flex-col gap-2">
          <label for="contactEmail" class="font-medium text-surface-900 dark:text-surface-0">Contact Email *</label>
          <input pInputText id="contactEmail" formControlName="contactEmail" type="email" />
          <small class="text-red-500" *ngIf="form.get('contactEmail')?.invalid && form.get('contactEmail')?.touched">
            Valid Email is required
          </small>
        </div>

        <div class="flex flex-col gap-2">
          <label for="contactPhone" class="font-medium text-surface-900 dark:text-surface-0">Contact Phone *</label>
          <input pInputText id="contactPhone" formControlName="contactPhone" />
          <small class="text-red-500" *ngIf="form.get('contactPhone')?.invalid && form.get('contactPhone')?.touched">
            Contact Phone is required
          </small>
        </div>

        <div class="flex flex-col gap-2">
          <label for="address" class="font-medium text-surface-900 dark:text-surface-0">Address *</label>
          <input pInputText id="address" formControlName="address" />
          <small class="text-red-500" *ngIf="form.get('address')?.invalid && form.get('address')?.touched">
            Address is required
          </small>
        </div>
      </div>

      <div class="flex justify-end gap-2 mt-4 pt-4 border-t border-surface-200 dark:border-surface-700">
        <p-button label="Cancel" severity="secondary" outlined (onClick)="onCancel()"></p-button>
        <p-button label="Save" type="submit" [loading]="facade.createLoading()"></p-button>
      </div>

    </form>
  </div>
</div>
