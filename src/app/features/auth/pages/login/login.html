<div class="flex min-h-screen w-full bg-surface-50 dark:bg-surface-950 transition-colors duration-200">
  
  <div class="hidden lg:flex w-1/2 bg-primary text-primary-contrast flex-col items-center justify-center p-12 relative overflow-hidden">
    <div class="z-10 text-center">
      <div class="mb-8 flex justify-center">
        <div class="w-20 h-20 bg-primary-contrast/20 rounded-2xl flex items-center justify-center backdrop-blur-sm">
          <lucide-icon [img]="icons.Monitor" [size]="40"></lucide-icon>
        </div>
      </div>
      <h1 class="text-5xl font-bold mb-4 tracking-tight">SPIP Platform</h1>
      <p class="text-xl text-primary-contrast/80 max-w-md mx-auto">
        Your complete authentication foundation built with modern tools.
      </p>
    </div>
  </div>

  <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 relative">
    
    <div class="absolute top-6 right-6 z-50">
      <p-button [rounded]="true" [text]="true" (onClick)="toggleTheme()">
        <lucide-icon *ngIf="themeService.currentTheme() === 'dark'" [img]="icons.Moon"></lucide-icon>
        <lucide-icon *ngIf="themeService.currentTheme() === 'light'" [img]="icons.Sun"></lucide-icon>
        <lucide-icon *ngIf="themeService.currentTheme() === 'system'" [img]="icons.Monitor"></lucide-icon>
      </p-button>
    </div>

    <div class="w-full max-w-md bg-surface-0 dark:bg-surface-900 rounded-2xl shadow-sm border border-surface-200 dark:border-surface-800 p-8">
      
      <div class="mb-8 text-center lg:text-left">
        <h2 class="text-3xl font-semibold text-surface-900 dark:text-surface-0 mb-2">Welcome Back</h2>
        <p class="text-surface-500 dark:text-surface-400">Please enter your details to sign in.</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <div class="flex flex-col gap-2">
          <label for="email" class="text-sm font-medium text-surface-900 dark:text-surface-0">Email</label>
          <input 
            pInputText 
            id="email" 
            type="email" 
            formControlName="email" 
            placeholder="name@example.com"
            class="w-full"
            [ngClass]="{'ng-invalid ng-dirty': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}"
          />
          <small class="text-red-500" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            A valid email is required.
          </small>
        </div>

        <div class="flex flex-col gap-2">
          <label for="password" class="text-sm font-medium text-surface-900 dark:text-surface-0">Password</label>
          <p-password 
            id="password" 
            formControlName="password" 
            [toggleMask]="true" 
            [feedback]="false"
            styleClass="w-full"
            inputStyleClass="w-full"
            placeholder="••••••••"
            [ngClass]="{'ng-invalid ng-dirty': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}">
          </p-password>
          <small class="text-red-500" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            Password is required.
          </small>
        </div>

        <div class="pt-2">
          <p-button 
            type="submit" 
            label="Sign In" 
            styleClass="w-full" 
            [loading]="isLoading()">
          </p-button>
        </div>
      </form>

      <div class="mt-8 text-center text-sm text-surface-500 dark:text-surface-400">
        Don't have an account? 
        <a routerLink="/auth/register" class="font-medium text-primary hover:underline">Sign up</a>
      </div>

    </div>
  </div>
</div>
