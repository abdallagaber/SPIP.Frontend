<div class="flex min-h-screen w-full bg-surface-50 dark:bg-surface-950 transition-colors duration-200">
  
  <div class="hidden lg:flex w-1/2 bg-primary text-primary-contrast flex-col items-center justify-center p-12 relative overflow-hidden">
    <div class="z-10 text-center">
      <div class="mb-8 flex justify-center">
        <div class="w-20 h-20 bg-primary-contrast/20 rounded-2xl flex items-center justify-center backdrop-blur-sm">
          <lucide-icon [img]="icons.Monitor" [size]="40"></lucide-icon>
        </div>
      </div>
      <h1 class="text-5xl font-bold mb-4 tracking-tight">Join SPIP Platform</h1>
      <p class="text-xl text-primary-contrast/80 max-w-md mx-auto">
        Create an account to get started with the best management features.
      </p>
    </div>
  </div>

  <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 relative">
    
    <div class="absolute top-6 right-6 z-50">
      <p-button [rounded]="true" [text]="true" (onClick)="toggleTheme()">
        <lucide-icon *ngIf="themeService.currentTheme() === 'dark'" [img]="icons.Moon"></lucide-icon>
        <lucide-icon *ngIf="themeService.currentTheme() === 'light'" [img]="icons.Sun"></lucide-icon>
        <lucide-icon *ngIf="themeService.currentTheme() === 'system'" [img]="icons.Monitor"></lucide-icon>
      </p-button>
    </div>

    <div class="w-full max-w-xl bg-surface-0 dark:bg-surface-900 rounded-2xl shadow-sm border border-surface-200 dark:border-surface-800 p-8 my-8">
      
      <div class="mb-8 text-center lg:text-left">
        <h2 class="text-3xl font-semibold text-surface-900 dark:text-surface-0 mb-2">Create an Account</h2>
        <p class="text-surface-500 dark:text-surface-400">Fill in the details below to sign up.</p>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="flex flex-col gap-2">
            <label for="fullName" class="text-sm font-medium text-surface-900 dark:text-surface-0">Full Name</label>
            <input pInputText id="fullName" formControlName="fullName" placeholder="John Doe" class="w-full"
              [ngClass]="{'ng-invalid ng-dirty': registerForm.get('fullName')?.invalid && registerForm.get('fullName')?.touched}" />
          </div>

          <div class="flex flex-col gap-2">
            <label for="userName" class="text-sm font-medium text-surface-900 dark:text-surface-0">Username</label>
            <input pInputText id="userName" formControlName="userName" placeholder="johndoe" class="w-full"
              [ngClass]="{'ng-invalid ng-dirty': registerForm.get('userName')?.invalid && registerForm.get('userName')?.touched}" />
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="flex flex-col gap-2">
            <label for="email" class="text-sm font-medium text-surface-900 dark:text-surface-0">Email</label>
            <input pInputText id="email" type="email" formControlName="email" placeholder="name@example.com" class="w-full"
              [ngClass]="{'ng-invalid ng-dirty': registerForm.get('email')?.invalid && registerForm.get('email')?.touched}" />
          </div>

          <div class="flex flex-col gap-2">
            <label for="phoneNumber" class="text-sm font-medium text-surface-900 dark:text-surface-0">Phone Number</label>
            <input pInputText id="phoneNumber" formControlName="phoneNumber" placeholder="+1234567890" class="w-full"
              [ngClass]="{'ng-invalid ng-dirty': registerForm.get('phoneNumber')?.invalid && registerForm.get('phoneNumber')?.touched}" />
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="flex flex-col gap-2">
            <label for="password" class="text-sm font-medium text-surface-900 dark:text-surface-0">Password</label>
            <p-password id="password" formControlName="password" [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" placeholder="••••••••"
              [ngClass]="{'ng-invalid ng-dirty': registerForm.get('password')?.invalid && registerForm.get('password')?.touched}">
            </p-password>
          </div>

          <div class="flex flex-col gap-2">
            <label for="confirmPassword" class="text-sm font-medium text-surface-900 dark:text-surface-0">Confirm Password</label>
            <p-password id="confirmPassword" formControlName="confirmPassword" [toggleMask]="true" [feedback]="false" styleClass="w-full" inputStyleClass="w-full" placeholder="••••••••"
              [ngClass]="{'ng-invalid ng-dirty': registerForm.hasError('passwordMismatch') && registerForm.get('confirmPassword')?.touched}">
            </p-password>
            <small class="text-red-500" *ngIf="registerForm.hasError('passwordMismatch') && registerForm.get('confirmPassword')?.touched">
              Passwords do not match.
            </small>
          </div>
        </div>

        <div class="pt-4">
          <p-button type="submit" label="Sign Up" styleClass="w-full" [loading]="isLoading()"></p-button>
        </div>
      </form>

      <div class="mt-8 text-center text-sm text-surface-500 dark:text-surface-400">
        Already have an account? 
        <a routerLink="/auth/login" class="font-medium text-primary hover:underline">Sign in</a>
      </div>

    </div>
  </div>
</div>
