<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold text-surface-900 dark:text-surface-0">Users</h1>
  </div>

  <div class="bg-surface-0 dark:bg-surface-900 rounded-xl shadow-sm border border-surface-200 dark:border-surface-700 p-4">
    <app-toolbar 
      [loading]="facade.loading()"
      [showAdd]="false"
      (searchChange)="facade.setSearchTerm($event)"
      (refresh)="facade.loadUsers()">
    </app-toolbar>

    @switch (facade.state()) {
      @case ('loading') {
        <app-loading-skeleton [columns]="columns.length + 1" [rows]="facade.pageSize()"></app-loading-skeleton>
      }
      @case ('empty') {
        <app-empty-state 
          [isSearch]="facade.searchTerm().length > 0"
          emptyMessage="No users found."
          searchEmptyMessage="No users match your search.">
        </app-empty-state>
      }
      @case ('error') {
        <app-error-state></app-error-state>
      }
      @case ('data') {
        <p-table [value]="facade.items()" [tableStyle]="{ 'min-width': '50rem' }" dataKey="id">
          <ng-template #header>
            <tr>
              <th *ngFor="let col of columns">{{ col.header }}</th>
              <th class="w-32 text-center">Actions</th>
            </tr>
          </ng-template>
          <ng-template #body let-user>
            <tr>
              <td>{{ user.fullName }}</td>
              <td>{{ user.email }}</td>
              <td>{{ user.role }}</td>
              <td>
                <p-toggleswitch 
                  [ngModel]="user.isActive" 
                  [disabled]="!canToggle"
                  (onChange)="onToggleStatus(user)">
                </p-toggleswitch>
              </td>
              <td>
                <div class="flex gap-2 justify-center">
                  <p-button 
                    *ngIf="canUpdate"
                    icon="pi pi-pencil" 
                    severity="secondary" 
                    [rounded]="true" 
                    [text]="true" 
                    pTooltip="Edit"
                    (onClick)="onEdit(user.id)">
                  </p-button>
                  <p-button 
                    *ngIf="canDelete"
                    icon="pi pi-trash" 
                    severity="danger" 
                    [rounded]="true" 
                    [text]="true" 
                    pTooltip="Delete"
                    (onClick)="confirmDelete(user.id)">
                  </p-button>
                </div>
              </td>
            </tr>
          </ng-template>
        </p-table>

        <app-pagination 
          class="mt-4 block"
          [totalCount]="facade.totalCount()"
          [pageNumber]="facade.pageNumber()"
          [pageSize]="facade.pageSize()"
          (pageChange)="facade.setPage($event.pageNumber, $event.pageSize)">
        </app-pagination>
      }
    }
  </div>
</div>

<app-delete-confirmation
  [(visible)]="deleteDialogVisible"
  [loading]="facade.deleteLoading()"
  message="Are you sure you want to delete this user?"
  (confirm)="onDelete()">
</app-delete-confirmation>
