<p-table [value]="rowsArray">
  <ng-template pTemplate="header">
    <tr>
      <th *ngFor="let col of columnsArray">
        <p-skeleton width="80%"></p-skeleton>
      </th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-rowData>
    <tr>
      <td *ngFor="let col of columnsArray">
        <p-skeleton></p-skeleton>
      </td>
    </tr>
  </ng-template>
</p-table>
