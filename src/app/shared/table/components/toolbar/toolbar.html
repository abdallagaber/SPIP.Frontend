<div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-4">
  <div class="flex-1 w-full md:w-auto">
    <div class="relative w-full md:max-w-md">
      <input 
        pInputText 
        type="text" 
        class="w-full !pr-10" 
        [placeholder]="searchPlaceholder()" 
        (input)="onSearch($event)" />
      <i class="pi pi-search absolute right-3 top-1/2 -translate-y-1/2 text-surface-400"></i>
    </div>
  </div>
  
  <div class="flex gap-2 w-full md:w-auto">
    <p-button 
      icon="pi pi-refresh" 
      [loading]="loading()" 
      [disabled]="loading()"
      (onClick)="onRefresh()" 
      severity="secondary" 
      outlined>
    </p-button>
    
    <p-button 
      *ngIf="showAdd()"
      [label]="addLabel()" 
      icon="pi pi-plus" 
      (onClick)="add.emit()">
    </p-button>
  </div>
</div>
